<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Add New Course</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Course Information Form</h2>
            <form action="#">
                <label for="cname">Course Name:</label>
                <input type="text" id="cname" name="cname" placeholder="Enter course name" required>

                <label for="inst">Instructor:</label>
                <input type="text" id="inst" name="inst" placeholder="Enter instructor name" required>

                <label for="hours">Credit Hours:</label>
                <input type="number" id="hours" name="hours" min="1" max="5" required>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Extra information..."></textarea>

                <button type="submit">Submit Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Internet Technology Project</p>
    </footer>
</body>
</html>
